window.translatePage = function(lang) {
  const currentLang = lang || localStorage.getItem('tcs_lang') || 'id';
  
  document.querySelectorAll('[data-translate]').forEach((element) => {
    const key = element.getAttribute('data-translate');
    const translation = window.TCS_TRANSLATIONS[key];
    
    if (translation && translation[currentLang] !== undefined) {
      // If element is input or textarea, translate placeholder
      if (element.tagName === 'INPUT' || element.tagName === 'TEXTAREA') {
        element.setAttribute('placeholder', translation[currentLang]);
      } else {
        // Safe innerHTML replacement for structural styling tags like span/strong
        element.innerHTML = translation[currentLang];
      }
    }
  });

  // Translate document metadata/title
  if (window.location.search.includes('page=spklu') || window.location.pathname.toLowerCase().includes('spklu.html')) {
    document.title = currentLang === 'id' 
      ? 'Kemitraan Bisnis SPKLU - PT. Titis Cahaya Sejahtera' 
      : 'SPKLU Business Partnership - PT. Titis Cahaya Sejahtera';
  } else {
    document.title = currentLang === 'id'
      ? 'PT. Titis Cahaya Sejahtera - MEP Contractor Nasional'
      : 'PT. Titis Cahaya Sejahtera - National MEP Contractor';
  }

  // Update active state in UI Lang Switcher
  document.querySelectorAll('.lang-btn').forEach((btn) => {
    btn.classList.remove('active');
    if (btn.getAttribute('data-lang') === currentLang) {
      btn.classList.add('active');
    }
  });
  
  // Fire language changed event for other components (like Chart.js or dynamic text)
  const event = new CustomEvent('tcsLanguageChanged', { detail: { language: currentLang } });
  window.dispatchEvent(event);
};

window.setLanguage = function(lang) {
  localStorage.setItem('tcs_lang', lang);
  window.translatePage(lang);
};

// Auto-run translation immediately on load to prevent flash of untranslated content (FOUC)
(function() {
  const savedLang = localStorage.getItem('tcs_lang') || 'id';
  // Translate when DOM is interactive
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', () => window.translatePage(savedLang));
  } else {
    setTimeout(() => window.translatePage(savedLang), 0);
  }
})();
</script>
