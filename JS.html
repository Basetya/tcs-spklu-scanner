/* ==========================================================================
   1. NAVIGATION & SCROLLSPY
   ========================================================================== */
function initNavbar() {
  const navbar = document.getElementById('navbar');
  const mobileToggle = document.getElementById('mobile-toggle');
  const navLinks = document.getElementById('nav-links');
  
  // Sticky Navbar on Scroll
  window.addEventListener('scroll', () => {
    if (window.scrollY > 50) {
      navbar.classList.add('scrolled');
    } else {
      navbar.classList.remove('scrolled');
    }
  });
  
  // Mobile Menu Toggle
  mobileToggle.addEventListener('click', () => {
    navLinks.classList.toggle('open');
  });
  
  // Close menu when link is clicked
  document.querySelectorAll('.nav-link').forEach(link => {
    link.addEventListener('click', () => {
      navLinks.classList.remove('open');
    });
  });

  // Auto-reset wizard when clicking any planner links if success screen is active
  document.querySelectorAll('a[href="#planner"]').forEach(link => {
    link.addEventListener('click', () => {
      const success = document.getElementById('wizard-success-pane');
      if (success && success.style.display === 'block') {
        resetWizard();
      }
    });
  });
}

function initScrollspy() {
  const sections = document.querySelectorAll('section');
  const navLinks = document.querySelectorAll('.nav-link:not(.nav-btn)');
  
  window.addEventListener('scroll', () => {
    let current = '';
    
    sections.forEach(section => {
      const sectionTop = section.offsetTop;
      const sectionHeight = section.clientHeight;
      if (window.pageYOffset >= (sectionTop - 150)) {
        current = section.getAttribute('id');
      }
    });
    
    navLinks.forEach(link => {
      link.classList.remove('active');
      if (link.getAttribute('href').slice(1) === current) {
        link.classList.add('active');
      }
    });
  });
}

/* ==========================================================================
   2. HERO INTERACTIVE CANVAS (MEP ENERGY/PIPE sirkuits)
   ========================================================================== */
function initHeroCanvas() {
  const canvas = document.getElementById('hero-canvas');
  if (!canvas) return;
  
  const ctx = canvas.getContext('2d');
  let animationFrameId;
  
  let width = canvas.width = window.innerWidth;
  let height = canvas.height = window.innerHeight;
  
  const particles = [];
  const particleCount = Math.min(60, Math.floor(width / 25)); // Responsive density
  const connectionDistance = 120;
  
  const mouse = {
    x: null,
    y: null,
    radius: 180
  };
  
  window.addEventListener('mousemove', (e) => {
    mouse.x = e.clientX;
    mouse.y = e.clientY + window.scrollY; // Compensate for scroll page offset
  });
  
  window.addEventListener('mouseleave', () => {
    mouse.x = null;
    mouse.y = null;
  });
  
  window.addEventListener('resize', () => {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
  });
  
  class Particle {
    constructor() {
      this.x = Math.random() * width;
      this.y = Math.random() * height;
      this.vx = (Math.random() - 0.5) * 0.6;
      this.vy = (Math.random() - 0.5) * 0.6;
      this.size = Math.random() * 2 + 1;
      
      // Select primary cyan, teal, or gold colors dynamically
      const colorType = Math.random();
      if (colorType < 0.4) {
        this.color = '0, 242, 254'; // Teal Cyan
      } else if (colorType < 0.8) {
        this.color = '0, 229, 117'; // Neon Green-Teal
      } else {
        this.color = '243, 156, 18'; // Amber Gold
      }
    }
    
    update() {
      this.x += this.vx;
      this.y += this.vy;
      
      // Screen edge bounce
      if (this.x < 0 || this.x > width) this.vx *= -1;
      if (this.y < 0 || this.y > height) this.vy *= -1;
      
      // Mouse push effect
      if (mouse.x != null && mouse.y != null) {
        let dx = this.x - mouse.x;
        let dy = this.y - mouse.y;
        let dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < mouse.radius) {
          const force = (mouse.radius - dist) / mouse.radius;
          this.x += (dx / dist) * force * 1.5;
          this.y += (dy / dist) * force * 1.5;
        }
      }
    }
    
    draw() {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${this.color}, 0.65)`;
      ctx.fill();
    }
  }
  
  // Initialize particles
  for (let i = 0; i < particleCount; i++) {
    particles.push(new Particle());
  }
  
  function animate() {
    ctx.clearRect(0, 0, width, height);
    
    // Connect particles
    for (let i = 0; i < particles.length; i++) {
      particles[i].update();
      particles[i].draw();
      
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        
        if (dist < connectionDistance) {
          const alpha = (connectionDistance - dist) / connectionDistance * 0.15;
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          // Color based on particle 1
          ctx.strokeStyle = `rgba(${particles[i].color}, ${alpha})`;
          ctx.lineWidth = 0.8;
          ctx.stroke();
        }
      }
    }
    
    animationFrameId = requestAnimationFrame(animate);
  }
  
  animate();
}

/* ==========================================================================
   3. SERVICES EXPLORER TABS

function initServiceTabs() {
  const tabButtons = document.querySelectorAll('.service-tab-btn');
  const tabPanes = document.querySelectorAll('.service-content-pane');
  
  tabButtons.forEach(button => {
    button.addEventListener('click', () => {
      const tabId = button.getAttribute('data-tab');
      
      // Update buttons
      tabButtons.forEach(btn => btn.classList.remove('active'));
      button.classList.add('active');
      
      // Update panes
      tabPanes.forEach(pane => {
        pane.classList.remove('active');
        if (pane.getAttribute('id') === `pane-${tabId}`) {
          pane.classList.add('active');
        }
      });
      
      // Resize BIM canvas if Design Facility tab is clicked and it's initialized
      if (tabId === 'design' && window.tcsBimState && typeof window.tcsBimState.resize === 'function') {
        setTimeout(() => {
          window.tcsBimState.resize();
        }, 50);
      }
    });
  });
}

window.selectWizardService = function(serviceName) {
  // Ensure the form is visible and success/loader screens are hidden if previous submission occurred
  const form = document.getElementById('tcs-wizard-form');
  const loader = document.getElementById('wizard-loader-pane');
  const success = document.getElementById('wizard-success-pane');
  if (form) form.style.display = 'block';
  if (loader) loader.style.display = 'none';
  if (success) success.style.display = 'none';

  const input = document.getElementById('wizard-input-service');
  if (input) {
    input.value = serviceName;
  }
  
  // Highlight card visually
  document.querySelectorAll('.service-select-card').forEach(card => {
    card.classList.remove('selected');
    if (card.getAttribute('data-val') === serviceName) {
      card.classList.add('selected');
    }
  });
  
  // Update step 2 questions dynamically
  updateStep2Questions(serviceName);
  
  // Directly set the step to 2 and update UI
  wizardStep = 2;
  updateWizardUI();
}

function updateStep2Questions(serviceName) {
  const currentLang = localStorage.getItem('tcs_lang') || 'id';
  const serviceConfig = serviceWizardConfigs[serviceName] || serviceWizardConfigs["HVAC System"];
  const config = serviceConfig[currentLang] || serviceConfig['id'];
  
  // Update Step 2 Title
  const titleEl = document.getElementById('wizard-step-2-title');
  if (titleEl) {
    titleEl.innerText = config.title;
  }
  
  // Update Step 2 Grid
  const gridEl = document.getElementById('wizard-step-2-grid');
  if (gridEl) {
    let html = '';
    config.options.forEach((opt) => {
      html += `
        <div class="scale-select-card" data-val="${opt.val}" onclick="selectWizardCard(this, 'scale')">
          <div class="scale-icon">${opt.icon}</div>
          <h4>${opt.title}</h4>
          <p>${opt.desc}</p>
        </div>
      `;
    });
    gridEl.innerHTML = html;
  }
  
  // Reset selected scale value when service changes
  const scaleInput = document.getElementById('wizard-input-scale');
  if (scaleInput) {
    scaleInput.value = '';
  }
}

let wizardStep = 1;
const totalSteps = 4;

function initWizard() {
  updateStep2Questions("HVAC System");
  updateWizardUI();
  
  // Dynamic language listener to re-render step 2 questions and next/prev button texts
  window.addEventListener('tcsLanguageChanged', (e) => {
    const currentService = document.getElementById('wizard-input-service').value;
    if (currentService) {
      updateStep2Questions(currentService);
    } else {
      updateStep2Questions("HVAC System");
    }
    updateWizardUI();
  });
}

window.selectWizardCard = function(element, type) {
  const val = element.getAttribute('data-val');
  
  if (type === 'service') {
    document.getElementById('wizard-input-service').value = val;
    document.querySelectorAll('.service-select-card').forEach(card => card.classList.remove('selected'));
    element.classList.add('selected');
    
    // Update step 2 questions dynamically based on selected service
    updateStep2Questions(val);
  } else if (type === 'scale') {
    document.getElementById('wizard-input-scale').value = val;
    document.querySelectorAll('.scale-select-card').forEach(card => card.classList.remove('selected'));
    element.classList.add('selected');
  }
  
  // Automatically move to next step for better micro-interactions UX
  setTimeout(() => {
    moveWizardStep(1);
  }, 350);
}

window.moveWizardStep = function(direction) {
  const currentLang = localStorage.getItem('tcs_lang') || 'id';

  // Validate current step before moving forward
  if (direction === 1) {
    if (wizardStep === 1) {
      const service = document.getElementById('wizard-input-service').value;
      if (!service) {
        const msg = currentLang === 'en'
          ? 'Please select one of the service categories first.'
          : 'Mohon pilih salah satu kategori jasa terlebih dahulu.';
        alert(msg);
        return;
      }
    } else if (wizardStep === 2) {
      const scale = document.getElementById('wizard-input-scale').value;
      if (!scale) {
        const msg = currentLang === 'en'
          ? 'Please select your project scale.'
          : 'Mohon pilih skala proyek Anda.';
        alert(msg);
        return;
      }
    } else if (wizardStep === 3) {
      const name = document.getElementById('wizard-name').value.trim();
      const phone = document.getElementById('wizard-phone').value.trim();
      if (!name || !phone) {
        const msg = currentLang === 'en'
          ? 'Full Name and active WhatsApp/phone number are required fields.'
          : 'Nama Lengkap dan Nomor Telepon/WhatsApp wajib diisi.';
        alert(msg);
        return;
      }
    }
  }
  
  wizardStep += direction;
  
  // Bound check
  if (wizardStep < 1) wizardStep = 1;
  if (wizardStep > totalSteps) wizardStep = totalSteps;
  
  // Update review values on step 4
  if (wizardStep === 4) {
    // Translate the Category values on Step 4 dynamically for premium quality
    const rawService = document.getElementById('wizard-input-service').value;
    const rawScale = document.getElementById('wizard-input-scale').value;
    
    // Check tab keys to see if we can easily map the service name
    let localizedService = rawService;
    if (currentLang === 'en') {
      if (rawService === "HVAC System") localizedService = "HVAC System";
      else if (rawService === "Electrical System") localizedService = "Electrical System";
      else if (rawService === "Plumbing System") localizedService = "Plumbing System";
      else if (rawService === "Process Utilities") localizedService = "Process Process Utilities";
      else if (rawService === "Fire Protection") localizedService = "Fire Protection";
      else if (rawService === "Water Treatment") localizedService = "Water Treatment";
      else if (rawService === "EV Charging & SPKLU") localizedService = "EV Charging & SPKLU";
      else if (rawService === "Design Facility") localizedService = "Design Facility";
    }

    document.getElementById('sum-service').innerText = localizedService;
    document.getElementById('sum-scale').innerText = rawScale;
    document.getElementById('sum-name').innerText = document.getElementById('wizard-name').value;
    document.getElementById('sum-company').innerText = document.getElementById('wizard-company').value || '-';
    document.getElementById('sum-phone').innerText = document.getElementById('wizard-phone').value;
  }
  
  updateWizardUI();
}

function updateWizardUI() {
  const currentLang = localStorage.getItem('tcs_lang') || 'id';

  // Toggle step panes
  document.querySelectorAll('.wizard-step-content').forEach(pane => pane.classList.remove('active'));
  document.getElementById(`step-${wizardStep}`).classList.add('active');
  
  // Toggle progress nodes active state
  document.querySelectorAll('.wizard-step-node').forEach((node, idx) => {
    const stepIdx = idx + 1;
    node.classList.remove('active', 'completed');
    
    if (stepIdx < wizardStep) {
      node.classList.add('completed');
    } else if (stepIdx === wizardStep) {
      node.classList.add('active');
    }
  });
  
  // Update progress line width
  const percent = ((wizardStep - 1) / (totalSteps - 1)) * 100;
  document.getElementById('wizard-progress-line').style.width = `${percent}%`;
  
  // Toggle prev/next action buttons
  const prevBtn = document.getElementById('btn-wizard-prev');
  const nextBtn = document.getElementById('btn-wizard-next');
  
  if (wizardStep === 1) {
    prevBtn.style.visibility = 'hidden';
  } else {
    prevBtn.style.visibility = 'visible';
    prevBtn.innerText = currentLang === 'en' ? 'Previous' : 'Sebelumnya';
  }
  
  if (wizardStep === totalSteps) {
    nextBtn.innerText = currentLang === 'en' ? 'Submit Plan' : 'Kirim Rencana';
    nextBtn.setAttribute('type', 'submit');
  } else {
    nextBtn.innerText = currentLang === 'en' ? 'Next' : 'Berikutnya';
    nextBtn.setAttribute('type', 'button');
    // Ensure button acts as step navigator
    nextBtn.onclick = () => moveWizardStep(1);
  }
}

window.handleWizardSubmit = function(event) {
  event.preventDefault();
  const currentLang = localStorage.getItem('tcs_lang') || 'id';
  
  // 1. Collect form data
  const formData = {
    service: document.getElementById('wizard-input-service').value,
    scale: document.getElementById('wizard-input-scale').value,
    name: document.getElementById('wizard-name').value.trim(),
    company: document.getElementById('wizard-company').value.trim(),
    phone: document.getElementById('wizard-phone').value.trim(),
    notes: document.getElementById('wizard-notes').value.trim()
  };
  
  // 2. Hide form UI, Show Loader
  document.getElementById('tcs-wizard-form').style.display = 'none';
  document.getElementById('wizard-loader-pane').style.display = 'block';
  
  // 3. Submit to GAS backend asynchronously via google.script.run (with Local Fallback Simulation)
  if (typeof google !== 'undefined' && google.script && google.script.run) {
    google.script.run
      .withSuccessHandler(onWizardSuccess)
      .withFailureHandler(onWizardFailure)
      .submitConsultation(formData);
  } else if (window.TCS_GAS_WEB_APP_URL) {
    // Vercel API Bridge Submit
    console.log("Bridging consultation submit to GAS Web App URL...");
    fetch(window.TCS_GAS_WEB_APP_URL, {
      method: "POST",
      headers: {
        "Content-Type": "text/plain"
      },
      body: JSON.stringify({
        action: "submitConsultation",
        data: formData
      })
    })
    .then(response => response.json())
    .then(res => {
      if (res.success) {
        onWizardSuccess(res);
      } else {
        onWizardFailure(new Error(res.message));
      }
    })
    .catch(err => {
      console.error("API submit failed, falling back locally:", err);
      // Fallback locally
      onWizardSuccess({
        success: true,
        message: currentLang === 'en'
          ? "Thank you #KawanTCS! Your consultation request has been successfully submitted. Our professional MEP engineers will contact you shortly via phone/WhatsApp: " + formData.phone
          : "Terima kasih #KawanTCS! Konsultasi Anda telah diterima. Tim profesional MEP kami akan segera menghubungi Anda melalui nomor telepon/WhatsApp: " + formData.phone
      });
    });
  } else {
    // Local environment simulation for rapid prototyping and offline checking
    console.warn("GAS Environment not detected. Simulating API submission locally...");
    setTimeout(() => {
      const mockResponse = {
        success: true,
        message: currentLang === 'en'
          ? "Thank you #KawanTCS! Your consultation request has been successfully submitted. Our professional MEP engineers will contact you shortly via phone/WhatsApp: " + formData.phone
          : "Terima kasih #KawanTCS! Konsultasi Anda telah diterima. Tim profesional MEP kami akan segera menghubungi Anda melalui nomor telepon/WhatsApp: " + formData.phone,
      };
      onWizardSuccess(mockResponse);
    }, 1500);
  }
}

/* ==========================================================================
   5. DYNAMIC STATS COUNTER ACTION
   ========================================================================== */
function initStatsCounter() {
  const statNumElements = document.querySelectorAll('.stat-num');
  
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const target = entry.target;
        const targetValAttr = target.innerText;
        
        // Skip year logic
        if (target.id === 'stat-year') return;
        
        const isPercent = targetValAttr.includes('%');
        const isPlus = targetValAttr.includes('+');
        
        const rawVal = parseInt(targetValAttr.replace(/[^0-9]/g, ''));
        animateCount(target, rawVal, isPercent, isPlus);
        
        observer.unobserve(target); // Animate once
      }
    });
  }, { threshold: 0.5 });
  
  statNumElements.forEach(el => observer.observe(el));
}

function animateCount(element, targetVal, isPercent, isPlus) {
  let currentVal = 0;
  const duration = 1200; // ms
  const stepTime = Math.max(10, Math.floor(duration / targetVal));
  
  const timer = setInterval(() => {
    currentVal++;
    element.innerText = currentVal + (isPercent ? '%' : '') + (isPlus ? '+' : '');
    
    if (currentVal >= targetVal) {
      clearInterval(timer);
      element.innerText = targetVal + (isPercent ? '%' : '') + (isPlus ? '+' : '');
    }
  }, stepTime);
}

/* ==========================================================================
   6. INTERACTIVE 3D BIM & CLASH DETECTION SIMULATOR
   ========================================================================== */
function initBimSimulator() {
  const canvas = document.getElementById('bimCanvas');
  if (!canvas) return;
  
  const ctx = canvas.getContext('2d');
  const scanline = document.getElementById('bimScanline');
  const hudStatus = document.getElementById('bimHudStatus');
  const consoleBody = document.getElementById('bimLogConsole');
  
  const togglePlumb = document.getElementById('bimTogglePlumbing');
  const toggleHvac = document.getElementById('bimToggleHvac');
  const toggleElec = document.getElementById('bimToggleElec');
  
  const btnRun = document.getElementById('bimBtnRun');
  const btnReset = document.getElementById('bimBtnReset');
  
  if (!scanline || !hudStatus || !consoleBody || !togglePlumb || !toggleHvac || !toggleElec || !btnRun || !btnReset) return;
  
  // Expose state globally so we can control and clean up if necessary
  window.tcsBimState = {
    state: 'idle', // 'idle', 'scanning', 'resolved'
    progress: 0,
    pipeOffset: 0, // current interpolated offset of plumbing (0 to 1)
    elecOffset: 0, // current interpolated offset of electrical (0 to 1)
    scale: 1,
    logsPrinted: new Set()
  };
  
  // Set high-DPI scaling for retina screens
  function resizeCanvas() {
    const rect = canvas.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    ctx.scale(dpr, dpr);
    window.tcsBimState.width = rect.width;
    window.tcsBimState.height = rect.height;
  }
  
  window.tcsBimState.resize = resizeCanvas;
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();
  
  // Isometric projection math helper
  function toIso(x, y, z) {
    const cx = window.tcsBimState.width / 2;
    const cy = window.tcsBimState.height / 2 - 10;
    
    // Rotate and projection factor
    const isoX = cx + (x - y) * 0.866; // cos(30) = 0.866
    const isoY = cy + (x + y) * 0.5 - z; // sin(30) = 0.5
    return { x: isoX, y: isoY };
  }
  
  // Drawing helpers
  function drawIsoPillar(x, y, h) {
    ctx.fillStyle = 'rgba(30, 41, 59, 0.4)';
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
    ctx.lineWidth = 1;
    
    // Draw columns
    const w = 15;
    const bottom = toIso(x, y, 0);
    const top = toIso(x, y, h);
    
    ctx.beginPath();
    ctx.moveTo(toIso(x - w, y - w, 0).x, toIso(x - w, y - w, 0).y);
    ctx.lineTo(toIso(x + w, y - w, 0).x, toIso(x + w, y - w, 0).y);
    ctx.lineTo(toIso(x + w, y + w, 0).x, toIso(x + w, y + w, 0).y);
    ctx.lineTo(toIso(x - w, y + w, 0).x, toIso(x - w, y + w, 0).y);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    
    // Vertical line
    ctx.beginPath();
    ctx.moveTo(bottom.x, bottom.y);
    ctx.lineTo(top.x, top.y);
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.08)';
    ctx.stroke();
  }
  
  function drawIsoBox(x, y, z, wx, wy, wz, colorGradients) {
    // Volume faces
    const p1 = toIso(x, y, z);
    const p2 = toIso(x + wx, y, z);
    const p3 = toIso(x + wx, y + wy, z);
    const p4 = toIso(x, y + wy, z);
    const p5 = toIso(x, y, z + wz);
    const p6 = toIso(x + wx, y, z + wz);
    const p7 = toIso(x + wx, y + wy, z + wz);
    const p8 = toIso(x, y + wy, z + wz);
    
    // Face Top
    ctx.fillStyle = colorGradients.top;
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(p5.x, p5.y);
    ctx.lineTo(p6.x, p6.y);
    ctx.lineTo(p7.x, p7.y);
    ctx.lineTo(p8.x, p8.y);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    
    // Face Left
    ctx.fillStyle = colorGradients.left;
    ctx.beginPath();
    ctx.moveTo(p1.x, p1.y);
    ctx.lineTo(p5.x, p5.y);
    ctx.lineTo(p8.x, p8.y);
    ctx.lineTo(p4.x, p4.y);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    
    // Face Right
    ctx.fillStyle = colorGradients.right;
    ctx.beginPath();
    ctx.moveTo(p2.x, p2.y);
    ctx.lineTo(p6.x, p6.y);
    ctx.lineTo(p7.x, p7.y);
    ctx.lineTo(p3.x, p3.y);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
  }
  
  function drawIsoTube(x1, y1, z1, x2, y2, z2, radius, color, glowColor) {
    const start = toIso(x1, y1, z1);
    const end = toIso(x2, y2, z2);
    
    ctx.strokeStyle = color;
    ctx.lineWidth = radius * 2;
    ctx.lineCap = 'round';
    
    if (glowColor) {
      ctx.shadowColor = glowColor;
      ctx.shadowBlur = 8;
    }
    
    ctx.beginPath();
    ctx.moveTo(start.x, start.y);
    ctx.lineTo(end.x, end.y);
    ctx.stroke();
    
    // Reset shadow
    ctx.shadowBlur = 0;
  }
  
  function drawClashNode(x, y, z, label, active) {
    const pt = toIso(x, y, z);
    const currentLang = localStorage.getItem('tcs_lang') || 'id';
    
    if (active) {
      // Glow pulse
      const pulseRadius = 8 + Math.sin(Date.now() / 150) * 4;
      ctx.fillStyle = 'rgba(239, 68, 68, 0.25)';
      ctx.beginPath();
      ctx.arc(pt.x, pt.y, pulseRadius + 6, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.fillStyle = '#ef4444';
      ctx.beginPath();
      ctx.arc(pt.x, pt.y, 6, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(pt.x, pt.y, 6, 0, Math.PI * 2);
      ctx.stroke();
      
      // Draw small warning text label
      ctx.fillStyle = '#f87171';
      ctx.font = 'bold 8px Courier New';
      ctx.fillText(label, pt.x + 10, pt.y - 4);
    } else {
      // Soft green checkmark node
      ctx.fillStyle = 'rgba(0, 229, 117, 0.2)';
      ctx.beginPath();
      ctx.arc(pt.x, pt.y, 10, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.fillStyle = '#00e575';
      ctx.beginPath();
      ctx.arc(pt.x, pt.y, 4, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.fillStyle = '#a7f3d0';
      ctx.font = 'bold 7px Courier New';
      ctx.fillText(currentLang === 'en' ? 'OK' : 'AMAN', pt.x + 8, pt.y - 4);
    }
  }
  
  // Console logging queue runner
  function addConsoleLine(logKey, type) {
    const currentLang = localStorage.getItem('tcs_lang') || 'id';
    const translation = window.TCS_TRANSLATIONS[logKey];
    const text = translation ? translation[currentLang] : logKey;
    
    // Prevent duplicate logs in same run
    if (window.tcsBimState.logsPrinted.has(logKey)) return;
    window.tcsBimState.logsPrinted.add(logKey);
    
    const lineEl = document.createElement('div');
    lineEl.className = `console-line ${type}`;
    lineEl.innerText = `> ${text}`;
    
    consoleBody.appendChild(lineEl);
    consoleBody.scrollTop = consoleBody.scrollHeight;
  }
  
  function clearConsole() {
    consoleBody.innerHTML = '';
    window.tcsBimState.logsPrinted.clear();
  }
  
  // MAIN ANIMATION LOOP
  function render() {
    ctx.clearRect(0, 0, window.tcsBimState.width, window.tcsBimState.height);
    
    // Draw Grid floor
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.02)';
    ctx.lineWidth = 0.5;
    for (let i = -160; i <= 160; i += 40) {
      ctx.beginPath();
      const p1 = toIso(i, -160, 0);
      const p2 = toIso(i, 160, 0);
      ctx.moveTo(p1.x, p1.y);
      ctx.lineTo(p2.x, p2.y);
      ctx.stroke();
      
      ctx.beginPath();
      const p3 = toIso(-160, i, 0);
      const p4 = toIso(160, i, 0);
      ctx.moveTo(p3.x, p3.y);
      ctx.lineTo(p4.x, p4.y);
      ctx.stroke();
    }
    
    // Draw Pillars/Columns
    drawIsoPillar(-120, -120, 80);
    drawIsoPillar(-120, 120, 80);
    drawIsoPillar(120, -120, 80);
    drawIsoPillar(120, 120, 80);
    
    // Interpolate offset routes
    if (window.tcsBimState.state === 'scanning') {
      window.tcsBimState.progress += 0.006;
      if (window.tcsBimState.progress >= 1) {
        window.tcsBimState.progress = 1;
        window.tcsBimState.state = 'resolved';
        
        // Update UI status to Zero-Clash
        hudStatus.className = 'bim-hud-status-badge clean';
        hudStatus.setAttribute('data-translate', 'bim_status_clean');
        const currentLang = localStorage.getItem('tcs_lang') || 'id';
        hudStatus.innerText = window.TCS_TRANSLATIONS['bim_status_clean'][currentLang];
        
        btnRun.style.display = 'none';
        btnReset.style.display = 'inline-block';
        scanline.classList.remove('scanning');
      }
      
      // Interpolate offsets
      window.tcsBimState.pipeOffset = Math.min(1, window.tcsBimState.progress * 1.3);
      window.tcsBimState.elecOffset = Math.min(1, window.tcsBimState.progress * 1.1);
      
      // Inject logs dynamically as scan bar passes coordinate thresholds
      if (window.tcsBimState.progress > 0.05) addConsoleLine('bim_log_1', 'system');
      if (window.tcsBimState.progress > 0.20) addConsoleLine('bim_log_2', 'scan');
      if (window.tcsBimState.progress > 0.35) addConsoleLine('bim_log_3', 'warn');
      if (window.tcsBimState.progress > 0.50) addConsoleLine('bim_log_4', 'warn');
      if (window.tcsBimState.progress > 0.65) addConsoleLine('bim_log_5', 'system');
      if (window.tcsBimState.progress > 0.78) addConsoleLine('bim_log_6', 'resolve');
      if (window.tcsBimState.progress > 0.88) addConsoleLine('bim_log_7', 'resolve');
      if (window.tcsBimState.progress >= 0.98) addConsoleLine('bim_log_8', 'resolve');
    }
    
    // --- 1. Draw HVAC Ducting (STATIC - TEAL) ---
    // Complies with real-life standards: volumetric HVAC ducts
    if (toggleHvac.checked) {
      drawIsoBox(
        -100, -60, 40,   // Position (X, Y, Z)
        200, 40, 25,     // Dimensions (WX, WY, WZ)
        {
          top: 'rgba(0, 229, 117, 0.15)',
          left: 'rgba(0, 229, 117, 0.1)',
          right: 'rgba(0, 229, 117, 0.2)'
        }
      );
    }
    
    // --- 2. Draw Plumbing System (BLUE PIPELINE with offset translation) ---
    // Connects chiller pipeline. Initial clash occurs at X:0, Y:-40, Z:40.
    if (togglePlumb.checked) {
      const zOffset = window.tcsBimState.pipeOffset * 35; // Shifts pipeline up by 35px in Z to resolve conflict
      
      // Part 1: Entering pipe
      drawIsoTube(-140, -40, 30, -50, -40, 30 + zOffset, 3.5, '#00f2fe', 'rgba(0, 242, 254, 0.3)');
      // Part 2: Middle crossing pipe (clashing segment)
      drawIsoTube(-50, -40, 30 + zOffset, 50, -40, 30 + zOffset, 3.5, '#00f2fe', 'rgba(0, 242, 254, 0.3)');
      // Part 3: Exiting pipe
      drawIsoTube(50, -40, 30 + zOffset, 140, -40, 30, 3.5, '#00f2fe', 'rgba(0, 242, 254, 0.3)');
    }
    
    // --- 3. Draw Electrical System (YELLOW WIRE WAY with offset translation) ---
    // Conduits. Initial clash occurs at X:-40, Y:-20, Z:55.
    if (toggleElec.checked) {
      const yOffset = window.tcsBimState.elecOffset * -25; // Shifts cable laterally by 25px in Y to resolve conflict
      
      // Part 1: Entering tray
      drawIsoTube(-40, -120, 52, -40, -50 + yOffset, 52, 1.8, '#f39c12', 'rgba(243, 156, 18, 0.2)');
      // Part 2: Middle crossing tray
      drawIsoTube(-40, -50 + yOffset, 52, -40, 40 + yOffset, 52, 1.8, '#f39c12', 'rgba(243, 156, 18, 0.2)');
      // Part 3: Exiting tray
      drawIsoTube(-40, 40 + yOffset, 52, -40, 120, 52, 1.8, '#f39c12', 'rgba(243, 156, 18, 0.2)');
    }
    
    // --- 4. Draw Clash / Conflict Nodes ---
    // Visually highlights real-life coordination nodes
    const plumbingActive = window.tcsBimState.state !== 'resolved';
    const electricalActive = window.tcsBimState.state !== 'resolved';
    
    if (toggleHvac.checked && togglePlumb.checked) {
      // Clash Node 1: Plumbing crossing HVAC duct boundary
      drawClashNode(-50, -40, 30, 'CLASH-B12A', plumbingActive);
      drawClashNode(50, -40, 30, 'CLASH-B12B', plumbingActive);
    }
    
    if (toggleHvac.checked && toggleElec.checked) {
      // Clash Node 2: Electrical tray crossing HVAC top clearance boundary
      drawClashNode(-40, -50, 52, 'CLASH-C04', electricalActive);
    }
    
    requestAnimationFrame(render);
  }
  
  // EVENT TRIGGER HANDLERS
  btnRun.addEventListener('click', () => {
    if (window.tcsBimState.state !== 'idle') return;
    
    window.tcsBimState.state = 'scanning';
    window.tcsBimState.progress = 0;
    scanline.classList.add('scanning');
    clearConsole();
    
    addConsoleLine('bim_log_1', 'system');
  });
  
  btnReset.addEventListener('click', () => {
    window.tcsBimState.state = 'idle';
    window.tcsBimState.progress = 0;
    window.tcsBimState.pipeOffset = 0;
    window.tcsBimState.elecOffset = 0;
    
    hudStatus.className = 'bim-hud-status-badge clash';
    hudStatus.setAttribute('data-translate', 'bim_status_clash');
    const currentLang = localStorage.getItem('tcs_lang') || 'id';
    hudStatus.innerText = window.TCS_TRANSLATIONS['bim_status_clash'][currentLang];
    
    btnRun.style.display = 'inline-block';
    btnReset.style.display = 'none';
    scanline.classList.remove('scanning');
    
    clearConsole();
    const lineEl = document.createElement('div');
    lineEl.className = 'console-line system';
    lineEl.innerText = '> [SYS] READY. PRESS RUN TO INITIATE 3D AUDIT.';
    consoleBody.appendChild(lineEl);
  });
  
  // Watch checkbox layer toggles
  togglePlumb.addEventListener('change', () => {
    addConsoleLine(togglePlumb.checked ? 'Plumbing Layer Enabled.' : 'Plumbing Layer Disabled.', 'system');
  });
  toggleHvac.addEventListener('change', () => {
    addConsoleLine(toggleHvac.checked ? 'HVAC Duct Layer Enabled.' : 'HVAC Duct Layer Disabled.', 'system');
  });
  toggleElec.addEventListener('change', () => {
    addConsoleLine(toggleElec.checked ? 'Electrical Layer Enabled.' : 'Electrical Layer Disabled.', 'system');
  });
  
  // Dynamic language listener to update HUD and reset console on the fly
  window.addEventListener('tcsLanguageChanged', (e) => {
    const lang = e.detail.language || 'id';
    
    // Update active status badge text
    const activeKey = hudStatus.getAttribute('data-translate');
    if (activeKey && window.TCS_TRANSLATIONS[activeKey]) {
      hudStatus.innerText = window.TCS_TRANSLATIONS[activeKey][lang];
    }
    
    // Translate the run and reset button texts
    const runKey = btnRun.getAttribute('data-translate');
    if (runKey && window.TCS_TRANSLATIONS[runKey]) {
      btnRun.innerText = window.TCS_TRANSLATIONS[runKey][lang];
    }
    const resetKey = btnReset.getAttribute('data-translate');
    if (resetKey && window.TCS_TRANSLATIONS[resetKey]) {
      btnReset.innerText = window.TCS_TRANSLATIONS[resetKey][lang];
    }
    
    // Translate the checkboxes toggle texts
    document.querySelectorAll('.bim-toggle-text').forEach((el) => {
      const key = el.getAttribute('data-translate');
      if (key && window.TCS_TRANSLATIONS[key]) {
        el.innerText = window.TCS_TRANSLATIONS[key][lang];
      }
    });
    
    // Re-render printed console logs in correct language
    const currentLines = Array.from(consoleBody.children);
    const printedLogs = Array.from(window.tcsBimState.logsPrinted);
    
    // Clear and reprint printed logs
    consoleBody.innerHTML = '';
    window.tcsBimState.logsPrinted.clear();
    
    if (printedLogs.length === 0) {
      const lineEl = document.createElement('div');
      lineEl.className = 'console-line system';
      lineEl.innerText = lang === 'en' ? '> [SYS] READY. PRESS RUN TO INITIATE 3D AUDIT.' : '> [SYS] READY. TEKAN MULAI UNTUK AUDIT BENTROKAN.';
      consoleBody.appendChild(lineEl);
    } else {
      printedLogs.forEach((logKey) => {
        let type = 'system';
        if (logKey.includes('log_3') || logKey.includes('log_4')) type = 'warn';
        else if (logKey.includes('log_6') || logKey.includes('log_7') || logKey.includes('log_8')) type = 'resolve';
        else if (logKey.includes('log_2')) type = 'scan';
        addConsoleLine(logKey, type);
      });
    }
  });
  
  // Kickstart animation loop
  render();
}

// Helper to apply dynamic contact numbers loaded from Sheets
function applyTcsContactSettings(settings) {
  if (!settings) return;
  
  const waContact = settings.TCS_CONTACT_WHATSAPP || "628111460707";
  const waSales = settings.TCS_SALES_WHATSAPP || "628111978888";
  const telephone = settings.TCS_CONTACT_TELEPHONE || "021 - 2126 6084";
  const telephoneDigits = telephone.replace(/[^0-9]/g, '');

  // 1. Update all links matching general/sales WhatsApp and telephone
  document.querySelectorAll('a').forEach(a => {
    let href = a.getAttribute('href') || '';
    if (href.includes('wa.me/628111460707')) {
      a.setAttribute('href', href.replace('628111460707', waContact));
    } else if (href.includes('wa.me/628111978888')) {
      a.setAttribute('href', href.replace('628111978888', waSales));
    } else if (href.startsWith('tel:')) {
      a.setAttribute('href', 'tel:' + telephoneDigits);
    }
  });

  // 2. Update specific text nodes / display numbers
  const headerContact = document.querySelector('.header-top-bar a[href^="tel:"]');
  if (headerContact) {
    headerContact.innerText = telephone;
  }
  
  const headerWa = document.querySelector('.header-top-bar a[href*="wa.me"]');
  if (headerWa) {
    let formattedWa = waContact;
    if (waContact.startsWith('62')) {
      formattedWa = '+62 ' + waContact.substring(2, 5) + '-' + waContact.substring(5, 9) + '-' + waContact.substring(9);
    }
    headerWa.innerText = formattedWa;
  }

  document.querySelectorAll('[data-translate="contact_wa_text"]').forEach(el => {
    let formattedWa = waContact;
    if (waContact.startsWith('62')) {
      formattedWa = '+62 ' + waContact.substring(2, 5) + '-' + waContact.substring(5, 9) + '-' + waContact.substring(9);
    }
    el.innerText = formattedWa + ' (Hubungi WA)';
  });
}

// Start API fetch immediately on script run to minimize visual latency
if (window.TCS_GAS_WEB_APP_URL) {
  fetch(window.TCS_GAS_WEB_APP_URL, {
    method: "POST",
    headers: {
      "Content-Type": "text/plain"
    },
    body: JSON.stringify({
      action: "getContactSettings"
    })
  })
  .then(res => res.json())
  .then(res => {
    if (res.success && res.settings) {
      window.tcsContactSettings = res.settings;
      applyTcsContactSettings(res.settings);
    }
  })
  .catch(err => {
    console.warn("Failed to load contact settings dynamically:", err);
  });
}

/* ==========================================================================
   9. SECURE GEMINI AI CHATBOT SYSTEM
   ========================================================================== */
function initTcsChatbot() {
  const trigger = document.getElementById('tcsChatTrigger');
  const container = document.getElementById('tcsChatContainer');
  const closeBtn = document.getElementById('tcsChatClose');
  const inputField = document.getElementById('tcsChatInput');
  const sendBtn = document.getElementById('tcsChatSend');
  const messagesArea = document.getElementById('tcsChatMessages');
  
  if (!trigger || !container || !closeBtn || !inputField || !sendBtn || !messagesArea) return;
  
  let chatOpen = false;
  let isAiResponding = false;
  
  // Toggle Chat Popup Window
  trigger.addEventListener('click', () => {
    chatOpen = !chatOpen;
    if (chatOpen) {
      container.classList.add('open');
      inputField.focus();
      // Remove pulsing on button once clicked
      const dot = trigger.querySelector('.chat-trigger-dot');
      if (dot) dot.style.display = 'none';
    } else {
      container.classList.remove('open');
    }
  });
  
  closeBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    chatOpen = false;
    container.classList.remove('open');
  });
  
  // Close chatbot when clicking outside
  document.addEventListener('click', (e) => {
    if (chatOpen && !container.contains(e.target) && !trigger.contains(e.target)) {
      chatOpen = false;
      container.classList.remove('open');
    }
  });
  
  // Send message on Enter keypress
  inputField.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
      sendChatMessage();
    }
  });
  
  // Send message on click
  sendBtn.addEventListener('click', sendChatMessage);
  
  function sendChatMessage() {
    const text = inputField.value.trim();
    if (!text || isAiResponding) return;
    
    isAiResponding = true;
    inputField.value = '';
    
    // 1. Render User Message bubble
    appendChatBubble(text, true);
    
    // 2. Render Typing Loading Indicator
    const loaderId = appendChatLoader();
    
    // 3. Trigger Secure Gemini Call (environment-aware)
    if (typeof google !== 'undefined' && google.script && google.script.run) {
      // Direct call inside Google Apps Script Web App
      google.script.run
        .withSuccessHandler((response) => handleChatSuccess(response, loaderId))
        .withFailureHandler((error) => handleChatFailure(error, loaderId))
        .callGeminiSecure(text);
    } else if (window.TCS_GAS_WEB_APP_URL) {
      // Call secure endpoint via Vercel/Static POST bridge
      fetch(window.TCS_GAS_WEB_APP_URL, {
        method: "POST",
        headers: {
          "Content-Type": "text/plain"
        },
        body: JSON.stringify({
          action: "callGeminiSecure",
          data: { query: text }
        })
      })
      .then(res => res.json())
      .then(response => handleChatSuccess(response, loaderId))
      .catch(error => handleChatFailure(error, loaderId));
    } else {
      // Local/offline developer preview fallback
      setTimeout(() => {
        const dummyResponses = [
          "Berdasarkan **Opsi A (Kemitraan Lahan)**, Anda bisa bermitra dengan modal mesin Rp0. Cukup sediakan lahan minimal muat 2-4 mobil. Bagi hasil bersih yang Anda peroleh adalah **35% untuk Anda (Host)** dan **65% untuk PT TCS**. Kami mengurus unit mesin, instalasi, dan perizinannya.\n\nApakah lahan Anda saat ini berada di area strategis seperti pusat perbelanjaan, rest area, atau jalan utama?",
          "Untuk **Opsi B (Finansial Mandiri)**, modal awal dimulai dari **Rp100 Juta** (skema Capex AC 22 kW mulai Rp150 Juta, dan Tipe DC 50 kW mulai Rp850 Juta). Skema ini autopilot penuh diurus tim TCS. Anda dapat memantau pendapatan harian secara real-time lewat aplikasi investor.\n\nBerapa kisaran anggaran investasi yang ingin Anda alokasikan untuk jaringan SPKLU ini?",
          "Legalitas dan izin operasional SPKLU sepenuhnya didampingi dan diurus oleh **PT TCS**. Kami memastikan sistem terintegrasi dengan regulasi PLN hulu-hilir (Permen ESDM No. 7/2024 & Kepmen ESDM 182.K/2023) sehingga bebas biaya rekening minimum selama 2 tahun pertama.\n\nApakah lokasi lahan Anda sudah memiliki daya listrik terpasang yang memadai atau membutuhkan upgrade?"
        ];
        
        let chosenText = dummyResponses[0];
        if (text.toLowerCase().includes('opsi b') || text.toLowerCase().includes('modal') || text.toLowerCase().includes('mandiri')) {
          chosenText = dummyResponses[1];
        } else if (text.toLowerCase().includes('izin') || text.toLowerCase().includes('legal') || text.toLowerCase().includes('pln')) {
          chosenText = dummyResponses[2];
        }
        
        handleChatSuccess({ success: true, text: chosenText }, loaderId);
      }, 1500);
    }
  }
  
  function handleChatSuccess(response, loaderId) {
    removeChatLoader(loaderId);
    isAiResponding = false;
    
    if (response.success && response.text) {
      appendChatBubble(response.text, false);
    } else {
      const errMsg = response.error || "Gagal mendapatkan balasan dari AI.";
      appendSystemError(errMsg);
    }
  }
  
  function handleChatFailure(error, loaderId) {
    removeChatLoader(loaderId);
    isAiResponding = false;
    appendSystemError("Terjadi kendala jaringan: " + (error.message || error));
  }
  
  function appendChatBubble(messageText, isUser = false) {
    const bubble = document.createElement('div');
    bubble.className = isUser ? 'tcs-chat-bubble user' : 'tcs-chat-bubble bot';
    
    // Parse simple formatting (markdown replacement for safe linebreaks and bold)
    let formattedText = messageText
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/\n/g, '<br/>')
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
      
    bubble.innerHTML = formattedText;
    messagesArea.appendChild(bubble);
    messagesArea.scrollTop = messagesArea.scrollHeight;
  }
  
  function appendSystemError(errorText) {
    const errorBubble = document.createElement('div');
    errorBubble.className = 'tcs-chat-bubble system-error';
    errorBubble.innerText = errorText;
    messagesArea.appendChild(errorBubble);
    messagesArea.scrollTop = messagesArea.scrollHeight;
  }
  
  function appendChatLoader() {
    const loaderId = 'loader_' + Date.now();
    
    const wrapper = document.createElement('div');
    wrapper.id = loaderId;
    wrapper.className = 'tcs-chat-bubble bot';
    wrapper.style.padding = '8px 12px';
    
    const loader = document.createElement('div');
    loader.className = 'tcs-typing-indicator';
    loader.innerHTML = `
      <span class="tcs-typing-dot"></span>
      <span class="tcs-typing-dot"></span>
      <span class="tcs-typing-dot"></span>
    `;
    
    wrapper.appendChild(loader);
    messagesArea.appendChild(wrapper);
    messagesArea.scrollTop = messagesArea.scrollHeight;
    
    return loaderId;
  }
  
  function removeChatLoader(loaderId) {
    const loader = document.getElementById(loaderId);
    if (loader) {
      loader.remove();
    }
  }
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', startApp);
} else {
  startApp();
}
</script>
